<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oslo Street Archive</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  :root{
    --ink:#0d1117;
    --panel:#12161c;
    --panel-line:#232a33;
    --track:#2f6fed;
    --track-bright:#5b8dff;
    --paper:#e9edf3;
    --dim:#7c8794;
    --mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;background:var(--ink);font-family:var(--sans);overflow:hidden; touch-action:manipulation;}

  #app{
    position:absolute; inset:0;
    display:flex;
    flex-direction:column;
  }

  /* ---- top half: map ---- */
  #mapPane{
    position:relative;
    width:100%; height:55%;
    flex-shrink:0;
    border-bottom:1px solid var(--panel-line);
  }
  #map{ position:absolute; inset:0; filter:saturate(0.75) brightness(0.95); }

  #hud{
    position:absolute; top:12px; left:12px; z-index:20;
    background:rgba(18,22,28,0.92); border:1px solid var(--panel-line);
    border-radius:10px; padding:12px 14px; max-width:220px;
    color:var(--paper); backdrop-filter:blur(6px);
  }
  #hud h1{
    font-size:12px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--track-bright); margin:0 0 3px; font-weight:600;
  }
  #hud p.sub{ margin:0 0 8px; font-size:11px; color:var(--dim); line-height:1.4;}
  .legend-row{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--dim); margin-bottom:2px;}
  .swatch{width:14px;height:3px;border-radius:2px;background:var(--track);}
  #videoList{list-style:none; margin:8px 0 0; padding:8px 0 0; border-top:1px solid var(--panel-line); max-height:120px; overflow-y:auto;}
  #videoList li{
    font-family:var(--mono); font-size:10.5px; color:var(--paper);
    padding:5px 3px; border-radius:5px; cursor:pointer; display:flex; justify-content:space-between; gap:6px;
  }
  #videoList li:active{background:rgba(91,141,255,0.12); color:var(--track-bright);}

  #coordReadout{
    position:absolute; bottom:10px; left:10px; z-index:20;
    font-family:var(--mono); font-size:10px; color:var(--dim);
    background:rgba(18,22,28,0.85); border:1px solid var(--panel-line);
    padding:4px 8px; border-radius:5px; pointer-events:none;
  }

  /* ---- bottom half: video preview ---- */
  #videoPane{
    position:relative;
    width:100%; height:45%;
    background:#000;
    flex-shrink:0;
  }
  #videoPreview{
    position:absolute; inset:0;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    overflow:hidden;
  }
  #videoPreview.active{ display:flex; }
  #videoPreview img{
    width:100%; height:100%; object-fit:cover;
    position:absolute; inset:0; z-index:0;
    opacity:0.5;
  }
  #videoPreview .play-overlay{
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    padding:0 20px;
  }
  #videoPreview .play-btn{
    width:64px; height:64px;
    border-radius:50%;
    background:rgba(47,111,237,0.9);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 20px rgba(47,111,237,0.4);
  }
  #videoPreview .play-btn svg{
    width:24px; height:24px; fill:white; margin-left:3px;
  }
  #videoPreview .play-text{
    color:var(--paper); font-family:var(--sans); font-size:14px; font-weight:600;
    text-align:center;
  }
  #videoPreview .play-sub{
    color:var(--dim); font-family:var(--mono); font-size:10px;
    text-align:center; line-height:1.4;
  }
  #videoPreview .badge{
    background:var(--track); color:white; font-family:var(--mono); font-size:9px;
    padding:3px 8px; border-radius:10px; margin-top:4px;
  }
  #videoIdle{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:8px;
    color:var(--dim); font-family:var(--mono); font-size:11px;
    text-align:center; padding:0 24px;
  }
  #videoIdle b{ color:var(--paper); font-weight:600; font-family:var(--sans); font-size:14px; }
  #videoMeta{
    position:absolute; bottom:12px; left:12px; right:12px; z-index:5;
    font-family:var(--mono); font-size:10px; color:var(--dim);
    background:rgba(18,22,28,0.9); border:1px solid var(--panel-line);
    padding:5px 10px; border-radius:6px;
    display:none; text-align:center;
  }
  #videoMeta b{ color:var(--paper); font-weight:600; }
  #videoMeta.active{ display:block; }

  .leaflet-container{ background:#0d1117; }

  /* Desktop: side-by-side */
  @media (min-width: 801px){
    #app{ flex-direction:row; }
    #videoPane{ width:50%; height:100%; border-right:1px solid var(--panel-line); border-bottom:none; }
    #mapPane{ width:50%; height:100%; }
    #hud{ top:16px; left:16px; width:260px; max-width:none; padding:14px 16px; }
    #hud h1{ font-size:13px; }
    #hud p.sub{ font-size:12px; margin-bottom:12px; }
    #videoList{ max-height:none; }
    #videoList li{ font-size:11.5px; padding:6px 4px; }
    #coordReadout{ bottom:16px; left:16px; font-size:11px; padding:6px 10px; }
    #videoMeta{ bottom:18px; left:18px; right:auto; font-size:12px; text-align:left; }
    #videoIdle{ font-size:12.5px; }
    #videoIdle b{ font-size:15px; }
  }
</style>
<base target="_blank">
</head>
<body>

<div id="app">
  <div id="mapPane">
    <div id="map"></div>
    <div id="hud">
      <h1>Oslo Street Archive</h1>
      <p class="sub">360&deg; footage of Oslo streets. Tap a blue line to watch.</p>
      <div class="legend-row"><span class="swatch"></span> Filmed street</div>
      <ul id="videoList"></ul>
    </div>
    <div id="coordReadout">tap a street to play</div>
  </div>

  <div id="videoPane">
    <div id="videoPreview">
      <img id="previewImg" src="" alt="Video preview">
      <div class="play-overlay">
        <div class="play-btn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="play-text">Open in YouTube</div>
        <div class="play-sub">360&deg; video with gyroscope<br>Opens at exact location</div>
        <div class="badge">360&deg;</div>
      </div>
    </div>

    <div id="videoIdle">
      <b>Oslo Street Archive</b>
      <span>Tap any blue street on the map to see its 360&deg; footage.</span>
    </div>
    <div id="videoMeta"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
/* ---------- config ---------- */
const OSLO_CENTER = [59.9139, 10.7522];
const MANIFEST_URL = 'manifest.json';
const IS_MOBILE = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

/* ---------- map setup ---------- */
const map = L.map('map', { zoomControl: true, attributionControl: true })
  .setView(OSLO_CENTER, 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 20
}).addTo(map);

window.addEventListener('load', () => map.invalidateSize());
setTimeout(() => map.invalidateSize(), 200);

/* ---------- state ---------- */
let tracks = [];
let currentEntry = null;
let currentSeconds = 0;

/* ---------- GPX parsing ---------- */
function parseGpx(xmlText) {
  const xml = new DOMParser().parseFromString(xmlText, 'application/xml');
  const pts = Array.from(xml.getElementsByTagName('trkpt')).map(pt => ({
    lat: parseFloat(pt.getAttribute('lat')),
    lon: parseFloat(pt.getAttribute('lon')),
    time: new Date(pt.getElementsByTagName('time')[0].textContent)
  }));
  if (!pts.length) return [];
  const t0 = pts[0].time.getTime();
  return pts.map(p => ({
    lat: p.lat, lon: p.lon,
    seconds: Math.max(0, Math.round((p.time.getTime() - t0) / 1000))
  }));
}

function nearestPoint(points, latlng) {
  let best = points[0], bestDist = Infinity;
  const target = L.latLng(latlng.lat, latlng.lng);
  for (const p of points) {
    const d = target.distanceTo([p.lat, p.lon]);
    if (d < bestDist) { bestDist = d; best = p; }
  }
  return best;
}

/* ---------- loading ---------- */
async function loadAll() {
  let manifest;
  try {
    manifest = await (await fetch(MANIFEST_URL)).json();
  } catch (e) {
    console.error('Could not load manifest.json — serve this folder over http(s), not file://', e);
    return;
  }

  const listEl = document.getElementById('videoList');
  const allBounds = [];

  for (const entry of manifest) {
    let gpxText;
    try {
      gpxText = await (await fetch(entry.gpx)).text();
    } catch (e) {
      console.error('Missing gpx for', entry.filename, e);
      continue;
    }
    const points = parseGpx(gpxText);
    if (!points.length) continue;

    const latlngs = points.map(p => [p.lat, p.lon]);
    allBounds.push(...latlngs);

    const hit = L.polyline(latlngs, { color: '#000', weight: 24, opacity: 0 }).addTo(map);
    const line = L.polyline(latlngs, { color: getComputedStyle(document.documentElement).getPropertyValue('--track').trim(), weight: 5, opacity: 0.9 }).addTo(map);

    [hit, line].forEach(l => {
      l.on('click', ev => {
        L.DomEvent.stopPropagation(ev);
        const p = nearestPoint(points, ev.latlng);
        playVideo(entry, p.seconds);
      });
    });

    tracks.push({ entry, points, polyline: line });

    const li = document.createElement('li');
    li.innerHTML = `<span>${entry.name || entry.filename}</span><span class="tag">${points.length} pts</span>`;
    li.addEventListener('click', () => map.fitBounds(latlngs, { maxZoom: 17 }));
    listEl.appendChild(li);
  }

  if (allBounds.length) map.fitBounds(allBounds, { padding: [40, 40] });
  map.invalidateSize();
}
loadAll();

/* ---------- video playback ---------- */
function playVideo(entry, seconds) {
  const startAt = Math.max(0, seconds + (entry.offsetAdjustSeconds || 0));
  currentEntry = entry;
  currentSeconds = startAt;

  const preview = document.getElementById('videoPreview');
  const previewImg = document.getElementById('previewImg');
  const idle = document.getElementById('videoIdle');
  const meta = document.getElementById('videoMeta');

  idle.style.display = 'none';
  preview.classList.add('active');

  previewImg.src = `https://img.youtube.com/vi/${entry.youtubeId}/mqdefault.jpg`;
  previewImg.onerror = () => {
    previewImg.src = `https://img.youtube.com/vi/${entry.youtubeId}/default.jpg`;
  };

  meta.innerHTML = `<b>${entry.name || entry.filename}</b> &nbsp;·&nbsp; t+${startAt}s`;
  meta.classList.add('active');

  preview.onclick = () => openYouTubeApp(entry.youtubeId, startAt);
}

/* ---------- open YouTube NATIVE APP (not browser) ---------- */
function openYouTubeApp(videoId, startAt) {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isAndroid = /Android/.test(navigator.userAgent);
  
  // Build URLs
  // iOS uses vnd.youtube:// scheme, Android uses youtube:// or intent://
  let appUrl, webUrl;
  
  if (isIOS) {
    // iOS: vnd.youtube:// opens native app reliably
    appUrl = `vnd.youtube://watch?v=${videoId}&t=${startAt}s`;
    webUrl = `https://www.youtube.com/watch?v=${videoId}&t=${startAt}s`;
  } else if (isAndroid) {
    // Android: intent:// scheme forces app chooser, prioritizing YouTube app
    appUrl = `intent://www.youtube.com/watch?v=${videoId}&t=${startAt}s#Intent;package=com.google.android.youtube;scheme=https;end;`;
    webUrl = `https://www.youtube.com/watch?v=${videoId}&t=${startAt}s`;
  } else {
    // Desktop/other: just open web
    window.open(`https://www.youtube.com/watch?v=${videoId}&t=${startAt}s`, '_blank');
    return;
  }

  // Try to open app first
  const now = Date.now();
  
  // Create hidden iframe to attempt app launch (works more reliably than window.location on some devices)
  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.src = appUrl;
  document.body.appendChild(iframe);
  
  // Clean up iframe
  setTimeout(() => {
    document.body.removeChild(iframe);
  }, 1000);
  
  // Also set window.location as backup method
  window.location.href = appUrl;
  
  // Fallback to web if app didn't open after delay
  setTimeout(() => {
    if (Date.now() - now < 1500) {
      // If we're still here, app didn't open — go to web
      window.location.href = webUrl;
    }
  }, 1200);
}
</script>
</body>
</html>
